syntax = "proto3";

package sessionproto;

option go_package = "github.com/cacggghp/vk-turn-proxy/sessionproto;sessionproto";

enum ClientHelloType {
  CLIENT_HELLO_TYPE_UNSPECIFIED = 0;
  CLIENT_HELLO_TYPE_PROBE = 1;
  CLIENT_HELLO_TYPE_SESSION = 2;
}

message ClientHello {
  uint32 version = 1;
  ClientHelloType type = 2;
  bytes session_id = 3;
  uint32 stream_id = 4;
}

message ServerHello {
  uint32 version = 1;
  bool mux_supported = 2;
  string error = 3;
  bool control_heartbeat_supported = 4;
}

message Heartbeat {
  uint32 version = 1;
  int64 wall_clock_ms = 2;
  uint32 active_streams = 3;
  bool online = 4;
  string wireguard_public_key_fingerprint = 5;
}
